version: "3.9"

services:

  postgres:
    image: postgres:17
    container_name: biblioteca_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: biblioteca_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: biblioteca_backend
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - .:/app

volumes:
  postgres_data: