<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Livro</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">

</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <h2 class="text-center mb-4">Editar Livro</h2>

                        <!-- Formulário -->
                         <form id="form-livro">
                            <div class="mb-3">
                                <label class="form-label">Titulo</label>
                                <input type="text" id="titulo" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Autor</label>
                                <input type="text" id="autor" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">ISBN</label>
                                <input type="text" id="isbn" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Categoria</label>
                                <input type="text" id="categoria" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Status</label>
                                <select id="status" class="form-select">
                                    <option value="disponivel" selected>Disponível</option>
                                    <option value="emprestado">Emprestado</option>
                                    <option value="manutencao">Manutenção</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Observações</label>
                                <textarea
                                    id="observacoes"
                                    class="form-control"
                                    rows="3">
                                </textarea>
                            </div>

                            <!-- Botões -->
                            <div class="d-flex justify-content-center gap-3">
                                <button type="submit" class="btn btn-warning">Atualizar</button>
                                <a href="/pages/visualizacao_livros.html" class="btn btn-secondary">Voltar</a>
                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="/js/editar_livro.js"></script>

</body>

</html>
