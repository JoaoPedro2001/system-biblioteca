<!DOCTYPE html>
<html lang="pt-br>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Bibliotecário</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">

</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <h2 class="text-center mb-4">Editar Bibliotecário</h2>
                        <p class="text-muted">Para manter a senha atual, mantenha os campos de Senha e Confirmar Senha vazios</p>

                        <!-- Formulário -->
                         <form id="form-bibliotecario">
                            <div class="mb-3">
                                <label class="form-label">Nome</label>
                                <input type="text" id="nome" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">E-mail</label>
                                <input type="email" id="email" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Senha</label>
                                <input type="password" id="senha" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Confirmar Senha</label>
                                <input type="password" id="confirmar-senha" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Permissão de administrador</label><br>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="admin" id="admin-sim" class="form-control" value="true" required>
                                    <label class="form-check-label" for="admin-sim">Sim</label>
                                </div>

                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="admin" id="admin-nao" class="form-control" value="false" required>
                                    <label class="form-check-label" for="admin-nao">Não</label>
                                </div>
                            </div>

                            <!-- Botões -->
                            <div class="d-flex justify-content-center gap-3">
                                <button type="submit" class="btn btn-success">Salvar</button>
                                <a href="/pages/visualizacao_bibliotecarios.html" class="btn btn-secondary">Voltar</a>
                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="/js/editar_bibliotecario.js"></script>

</body>

</html>
