<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibliotecários</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">

</head>
<body class="bg-light">
    <div class="container mt-5">
        <!-- Título -->

        <div class="text-center mb-5">
            <h1>Bibliotecários</h1>
            <p class="text-muted">Gerenciamento de bibliotecários cadastrados</p>

        </div>
        <!-- Tabela -->
        <div class="card shadow">

            <div class="card-body">
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Selecionar</th>
                            <th>ID</th>
                            <th>Livro</th>
                            <th>Leitorr</th>
                            <th>Bibliotecário</th>
                            <th>Data de emprestimo</th>
                            <th>Data de devolução</th>
                            <th>Status</th>
                        </tr>

                    </thead>

                    <tbody id="tabela-bibliotecarios">

                        <!-- Javascript insere o dados do BD aqui -->

                    </tbody>

                </table>

            </div>

        </div>

        <!-- Botões -->
        <div class="d-flex justify-content-center gap-3 mt-4">
            <a
                class="btn btn-success w-100"
                href="novo_bibliotecario.html"    
            >
                Novo Bibliotecário
            </a>

            <button
                class="btn btn-warning w-100"
                onclick="editarBiblitecario()"
            >
                Editar Bibliotecário
            </button>

            <button
                class="btn btn-danger w-100"
                onclick="removerBibliotecario()"
            >
                Remover Bibliotecário
            </button>
            
            <a
                class="btn btn-secondary w-100"
                href="../index.html"
            >
                Voltar
            </a>

        </div>

    </div>

    <!-- JAVASCRIPT -->
    <script src="../js/bibliotecarios.js"></script>

</body>

</html>
