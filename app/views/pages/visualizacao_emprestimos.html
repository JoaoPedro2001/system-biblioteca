<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emprestimos</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">

</head>
<body class="bg-light">
    <div class="container mt-5">
        <!-- Título -->

        <div class="text-center mb-5">
            <h1>Leitores</h1>
            <p class="text-muted">Gerenciamento de emprestimos cadastrados</p>

        </div>
        <!-- Tabela -->
        <div class="card shadow">

            <div class="card-body">
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Selecionar</th>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>E-mailr</th>
                            <th>Telefone</th>
                            <th>Data de Cadastro</th>
                        </tr>

                    </thead>

                    <tbody id="tabela-emprestimos">

                        <!-- Javascript insere o dados do BD aqui -->

                    </tbody>

                </table>

            </div>

        </div>

        <!-- Botões -->
        <div class="d-flex justify-content-center gap-3 mt-4">
            <a
                class="btn btn-success w-100"
                href="novo_emprestimo.html"    
            >
                Novo Emprestimo
            </a>

            <button
                class="btn btn-warning w-100"
                onclick="editarEmprestimo()"
            >
                Editar Emprestimo
            </button>

            <button
                class="btn btn-danger w-100"
                onclick="removerEmprestimo()"
            >
                Remover Emprestimo
            </button>
            
            <a
                class="btn btn-secondary w-100"
                href="../index.html"
            >
                Voltar
            </a>

        </div>

    </div>

    <!-- JAVASCRIPT -->
    <script src="../js/emprestimos.js"></script>

</body>

</html>
