<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Empréstimo</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">

</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <h2 class="text-center mb-4">Editar Empréstimo</h2>

                        <!-- Formulário -->
                         <form id="form-emprestimo">
                            <div class="mb-3 form-check">
                                <label class="form-check-label">Renovar empréstimo (+7 dias)</label>
                                <input type="checkbox" class="form-check-input" id="renovar">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Status</label>
                                <select id="status" class="form-select">
                                    <option value="emprestado">Emprestado </option>
                                    <option value="devolvido">Devolvido</option>
                                </select>
                            </div>

                            <!-- Botões -->
                            <div class="d-flex justify-content-center gap-3">
                                <button type="submit" class="btn btn-warning">Atualizar</button>
                                <a href="/pages/visualizacao_emprestimos.html" class="btn btn-secondary">Voltar</a>
                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="/js/editar_emprestimo.js"></script>

</body>

</html>
