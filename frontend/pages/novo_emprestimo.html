<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Empréstimo</title>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <h2 class="text-center mb-4">Novo Empréstimo</h2>

                        <form id="form-emprestimo">
                             <!-- Livro -->
                            <div class="mb-3">
                                <label class="form-label">Livro</label>

                                <select id="livro" class="form-select" required>
                                    <option value="">Selecione um livro</option>

                                </select>
                            </div>

                            <!-- Leitor -->
                            <div class="mb-3">
                                <label class="form-label">Leitor</label>

                                <select id="leitor" class="form-select" required>
                                    <option value=""> Selecione um leitor</option>

                                </select>
                            </div>

                            <!-- Bibliotecário -->
                            <div class="mb-3">
                                <label class="form-label">Bibliotecário</label>

                                <select id="bibliotecario" class="form-select" required>
                                    <option value="">Selecione um bibliotecário</option>

                                </select>
                            </div>

                            <!-- BOTÕES -->
                            <div class="d-flex justify-content-center gap-3">
                                <button type="submit" class="btn btn-success">Salvar</button>
                                <a href="/pages/visualizacao_emprestimos.html" class="btn btn-secondary">Voltar</a>
                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="/js/novo_emprestimo.js"></script>

</body>
</html>
